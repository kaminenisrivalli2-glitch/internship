<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HE5 SiteGen — Generate Your Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 640px;">
    <h1 class="mb-4">Generate Your Website</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('generate.generate') }}">
      <div class="mb-3">
        <label class="form-label">Business Name</label>
        <input type="text" name="business_name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Business Type</label>
        <input type="text" name="business_type" class="form-control"
               placeholder="e.g. Restaurant, Gym, Hotel, Bakery, Clinic, Startup" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Short Description (optional)</label>
        <textarea name="description" class="form-control" rows="3"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Tone (optional)</label>
        <input type="text" name="tone" class="form-control" placeholder="e.g. luxurious, friendly, bold">
      </div>
      <button type="submit" class="btn btn-primary w-100">Generate Website</button>
    </form>
  </div>
</body>
</html>
